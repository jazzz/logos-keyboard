name: Build Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Generate keylayouts
        run: python generate_keylayouts.py

      - name: Build bundle
        run: python create_bundle.py ${{ steps.version.outputs.version }}

      - name: Import certificates
        env:
          INSTALLER_CERTIFICATE_P12: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_P12 }}
          INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$INSTALLER_CERTIFICATE_P12" | base64 --decode > /tmp/installer_cert.p12
          security import /tmp/installer_cert.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$INSTALLER_CERTIFICATE_PASSWORD" \
            -T /usr/bin/pkgbuild \
            -T /usr/bin/productbuild
          rm /tmp/installer_cert.p12

          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build and sign pkg
        working-directory: build
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          BUNDLE="λKeyboard.bundle"
          PKG="LogosKeyboard.pkg"

          # Build unsigned component pkg with relative install path (no leading /)
          # so productbuild can resolve it relative to the user's home directory
          pkgbuild \
            --component "$BUNDLE" \
            --install-location "Library/Keyboard Layouts" \
            --identifier io.jazzz.logos-keyboard.keyboardlayout \
            --version ${{ steps.version.outputs.version }} \
            component.pkg

          # Wrap in a signed distribution pkg that installs to ~/Library/Keyboard Layouts
          productbuild \
            --distribution "$GITHUB_WORKSPACE/pkg/distribution.xml" \
            --package-path . \
            --resources "$GITHUB_WORKSPACE/pkg" \
            --sign "Developer ID Installer: $APPLE_TEAM_ID" \
            "$PKG"

          rm component.pkg

      - name: Notarize pkg
        working-directory: build
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          PKG="LogosKeyboard.pkg"
          KEY_PATH=$RUNNER_TEMP/AuthKey.p8

          echo "$APPLE_API_KEY" > "$KEY_PATH"

          xcrun notarytool submit "$PKG" \
            --key "$KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait

          rm "$KEY_PATH"

      - name: Staple pkg
        working-directory: build
        run: |
          PKG="LogosKeyboard.pkg"
          xcrun stapler staple "$PKG"

      - name: Create bundle zip
        working-directory: build
        run: |
          BUNDLE="λKeyboard.bundle"
          zip -r "LogosKeyboard.bundle.zip" "$BUNDLE"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/LogosKeyboard.pkg
            build/LogosKeyboard.bundle.zip

<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: -apple-system, sans-serif; padding: 16px;">
  <h2>Installation complete!</h2>
  <p>To start using λ Keyboard, add it as an input source:</p>
  <ol>
    <li>Open <strong>System Settings → Keyboard</strong></li>
    <li>Click <strong>Edit…</strong> next to Input Sources</li>
    <li>Click <strong>+</strong> and search for <strong>λ</strong></li>
    <li>Select your preferred layout (e.g. <em>λ - U.S.</em>) and click <strong>Add</strong></li>
  </ol>
</body>
</html>
